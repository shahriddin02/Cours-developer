<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
    <header class="sidebar">
       <div class="logo">
        <img src="./img/Logo-fin2.png" alt="Logo">
        <img src="./img/Profile.png" alt="Profile">
    </div>
    <nav class="menu">
        <a href="#" class="menu_item">
            <img src="./img/insert_chart.png" alt="">
            <span>Статистика</span>
        </a>
        <a href="#" class="menu_item active">
            <img src="./img/mdi_view-grid-outline (1).png" alt="">
            <span>Курсы</span>
        </a>
        <a href="#" class="menu_item">
            <img src="./img/supervised_user_circle.png" alt="">
            <span>Пользователи</span>
        </a>
        <a href="./mentors.html" class="menu_item">
            <img src="./img/supervisor_account.png" alt="">
            <span>Менторы</span>
        </a>
        <a href="#" class="menu_item">
            <img src="./img/settings.png" alt="">
            <span>Настройки</span>
        </a>
    </nav>
    </header>
    <main class="main">
        <div class="page_header">
            <a href="./course.html"><--</a>
            <h1>Новый курс</h1>
        </div>
        <div class="course_card">
            <form class="course_form">
                <input type="text" placeholder="Название курса" class="name">
                <textarea placeholder="Краткое описание" class="description"></textarea>
                <div class="form_row">
    <input type="text" placeholder=".jpeg / .png / .jpg / .svg" class="logo">

    <div class="switch_group">
        <span>Сертификат об окончании</span>
        <input type="checkbox" class="certificate">
    </div>
</div>

<div class="form_row">
    <input type="number" placeholder="Модули курс" class="module">
    <input type="number" placeholder="Уроки курс" class="lessons">
</div>

<div class="form_row">
    <input type="text" placeholder="Имя и Фамилия Учитель" class="mentorName">
    <input type="text" placeholder=".jpeg / .png / .jpg / .svg" class="mentorAvatar">
</div>

<div class="form_row">
    <select class="category">
        <option>Frontend</option>
        <option>Backend</option>
        <option>FullStack</option>
        <option>C++</option>
    </select>

    <div class="switch_group">
        <span>Статус курса</span>
        <input type="checkbox" class="status">
    </div>
</div>
                <div class="form_actions">
                    <button class="btn_save" type="submit">Сохранить</button>
                    <button class="btn_cancel" type="button">Отменить</button>
                </div>
            </form>
        </div>
    </main>
 </div>



            <script src="./script.js"></script>


</body>
</html>
