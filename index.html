<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
    <header class="sidebar">
       <div class="logo">
        <img src="./img/Logo-fin2.png" alt="Logo">
        <img src="./img/Profile.png" alt="Profile">
    </div>
    <nav class="menu">
        <a href="#" class="menu_item">
            <img src="./img/insert_chart.png" alt="">
            <span>Статистика</span>
        </a>
        <a href="#" class="menu_item active">
            <img src="./img/mdi_view-grid-outline (1).png" alt="">
            <span>Курсы</span>
        </a>
        <a href="#" class="menu_item">
            <img src="./img/supervised_user_circle.png" alt="">
            <span>Пользователи</span>
        </a>
        <a href="./mentors.html" class="menu_item">
            <img src="./img/supervisor_account.png" alt="">
            <span>Менторы</span>
        </a>
        <a href="#" class="menu_item">
            <img src="./img/settings.png" alt="">
            <span>Настройки</span>
        </a>
    </nav>
    </header>
    <main class="main">
        <div class="page_header">
           <a class="back" href="./pages/course.html"><h1> 🔙 Новый курс</h1></a>
        </div>
        <div class="course_card">
            <form class="course_form" id="courseForm">

                <input type="text" placeholder="Название курса" class="name">
                <textarea placeholder="Краткое описание" class="description"></textarea>

                <div class="form_row">
                    <input type="text" class="courseLogo" placeholder=".jpeg / .png / .jpg / .svg (ссылка на лого)">
                    <div class="switch_group">
                        <span>Сертификат об окончании</span>
                        <input type="checkbox" class="certificate">
                    </div>
                </div>

                <div class="form_row">
                    <input type="number" class="module" placeholder="Модули курс">
                    <input type="number" class="lessons" placeholder="Уроки курс">
                </div>

                <div class="form_row">
                    <input type="text" class="mentorName" placeholder="Имя и Фамилия Учитель">
                    <input type="text" class="mentorAvatar" placeholder=".jpeg / .png / .jpg / .svg (фото учителя)">
                </div>

                <div class="form_row">
                    <input type="tel" class="mentorNumberPhone" placeholder="Телефон учителя">
                </div>

                <div class="form_row">
                    <select class="category">
                        <option>Frontend</option>
                        <option>Backend</option>
                        <option>FullStack</option>
                        <option>C++</option>
                    </select>
                    <div class="switch_group">
                        <span>Статус курса</span>
                        <input type="checkbox" class="status">
                    </div>
                </div>

                <div class="form_actions">
                    <button type="submit" class="btn_save">Сохранить</button>
                    <button type="button" class="btn_cancel" id="cancelBtn">Отменить</button>
                </div>
            </form>
        </div>
    </main>
 </div>

    <script src="./script.js"></script>

</body>
</html>
